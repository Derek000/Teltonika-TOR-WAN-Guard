# Teltonika Tor WAN Guard configuration

# Name of the ipset used by firewall rules.
IPSET_NAME="tor_exit"

# Tor Project bulk exit list.
TOR_URL="https://check.torproject.org/torbulkexitlist"

# WAN interface name.
# Common examples: wan, eth1, wwan0, mob1s1a1
WAN_IFACE="wan"

# Cron update interval installed by install.sh.
# Default: minute 17 every 6 hours.
CRON_SCHEDULE="17 */6 * * *"

# Maximum expected entries.
IPSET_MAXELEM="65536"
